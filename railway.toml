[build]
builder = "NIXPACKS"
buildCommand = "cd frontend && npm ci && npm run build && cd ../backend && pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"

[deploy]
startCommand = "cd backend && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
healthcheckPath = "/api/agents/"
restartPolicyType = "ON_FAILURE"
